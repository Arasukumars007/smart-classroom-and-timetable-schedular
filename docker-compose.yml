version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: smart_classroom_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scpassword}
      POSTGRES_DB: ${POSTGRES_DB:-smart_classroom}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scadmin -d smart_classroom"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_classroom_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-scadmin}:${POSTGRES_PASSWORD:-scpassword}@postgres:5432/${POSTGRES_DB:-smart_classroom}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_in_production_32chars}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://localhost:80","http://frontend"]'
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python seed_data.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart_classroom_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000

volumes:
  postgres_data:
