# render.yaml — Render Blueprint for Smart Classroom & Timetable Scheduler
# Deploy everything with one click: https://dashboard.render.com/select-repo
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── 1. FastAPI Backend ──────────────────────────────────────────────────────
  - type: web
    name: smart-classroom-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-classroom-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure random secret
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: FRONTEND_URL
        fromService:
          name: smart-classroom-frontend
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ── 2. React Frontend (Static Site) ─────────────────────────────────────────
  - type: web
    name: smart-classroom-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: smart-classroom-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL

# ── 3. Managed PostgreSQL Database ─────────────────────────────────────────────
databases:
  - name: smart-classroom-db
    plan: free
    databaseName: smart_classroom
    user: scadmin
